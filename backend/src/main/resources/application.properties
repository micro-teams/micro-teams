spring.application.name=microteams

# Default database configuration. These are generic local-dev/CI defaults,
# not real deployment values — real ones (matching cheese-auth's own DB) are
# passed via --spring.datasource.* command-line overrides at runtime, since
# whatever's baked in here at build time can't change afterwards. See the
# root README's "Build and run backend" section.
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
# nt's own tables live in "microteams", separate from cheese-auth's "public" schema
# (which owns user/user_profile/avatar) so cheese-auth's `prisma db push`
# can never touch anything nt creates. Entities that ARE shared with
# cheese-auth (User, UserProfile, Avatar) override this with an explicit
# schema="public" on their own @Table annotation.
spring.jpa.properties.hibernate.default_schema=microteams

application.legacy-url=http://localhost:8091
application.jwt-secret=test-secret
application.cors-origin=http://localhost:8091
application.warn-audit-failure=true

# In a deployment the applets are mounted here (an independent build artifact, swappable without
# rebuilding the jar). Empty by default so tests/standalone fall back to the classpath copy.
application.applets-dir=

# Actuator health, used as the container healthcheck. Use the readiness probe
# (/actuator/health/readiness) rather than the aggregate /actuator/health: several dependencies
# inherited from the cheese lineage (redis, elasticsearch) are unused but still register health
# indicators that report DOWN with no server, which would 503 the aggregate forever. Readiness only
# reflects the app's own lifecycle (UP once it has fully started, which requires a working DB), so it
# is the right "is the backend up" signal for compose.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# To disable such a warning:
# spring.jpa.open-in-view is enabled by default. Therefore, database queries may be performed during view rendering.
# Explicitly configure spring.jpa.open-in-view to disable this warning
#
# According to our test, disable this configuration will cause JPA to not work at all.
# So, we enable it here.
spring.jpa.open-in-view=true
