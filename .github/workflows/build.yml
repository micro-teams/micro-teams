name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# One workflow builds all four parts in parallel, packages them into a deployment zip, then proves
# the zip actually boots by bringing the docker-compose cluster up and waiting for every service to
# report healthy.

jobs:
  build-jar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: backend/pom.xml
          # backend/.gitignore excludes settings.xml/toolchains.xml relative to backend/; point
          # setup-java there too, or the spotless "uncommitted changes" check sees them as untracked.
          settings-path: ${{ github.workspace }}/backend

      # Our tests are integration tests: they need a real Postgres (with the "microteams" schema) and
      # the real cheese-auth service. One script brings both up, mirroring the local setup.
      - name: Start dependencies (Postgres + cheese-auth)
        run: ./scripts/dependency-start.sh

      - name: Build with Maven (runs the integration tests)
        run: ./mvnw install
        env:
          SPRING_APPLICATION_JSON: '{"spring.jpa.hibernate.ddl-auto":"update","application.git-repo-base":"${{ runner.temp }}/microteams-git"}'

      - name: Check uncommitted changes to ensure format applied
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git status
            echo "There are uncommitted changes. Please run './mvnw spotless:apply' and commit the changes."
            exit 1
          else
            echo "No uncommitted changes."
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: jar
          path: backend/target/*.jar

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  build-applet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applets
    steps:
      - uses: actions/checkout@v7
      # openapi-generator (the codegen step) runs on the JVM.
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: applets/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload applets
        uses: actions/upload-artifact@v7
        with:
          name: applets
          path: applets/dist

  build-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build binaries (one per OS/arch)
        run: |
          set -euo pipefail
          mkdir -p dist
          # Product version from the repo-root VERSION file (single source of truth,
          # managed by scripts/version.sh), with the short commit as build metadata for
          # traceability — e.g. 0.1.0+1a2b3c4. cwd is cli/, so VERSION is one level up.
          VERSION="$(cat ../VERSION)+${GITHUB_SHA::7}"
          # Unix only: the host uses a pty, tmux, and SIGUSR2, so a machine that runs agents is
          # always Linux or macOS — Windows is not a target (it lacks syscall.SIGUSR2).
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${t%/*}"; arch="${t#*/}"
            echo "building microteams-$os-$arch"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
              -o "dist/microteams-$os-$arch" .
          done
          ls -la dist
      - name: Upload cli binaries
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: cli/dist

  build-tmux:
    # A fully static tmux per Linux target, so a fresh machine needs nothing pre-installed:
    # install.sh drops it at ~/.config/microteams/bin/tmux (macOS is not published — install.sh
    # falls back to copying the machine's own tmux there). Only the build recipe is in git.
    #
    # Built NATIVELY on a matching-arch runner — the arm64 build used to run under QEMU emulation
    # (minutes of emulated gcc; the Dockerfile already passes `make -j$(nproc)`, so the bottleneck was
    # emulation, not parallelism). The two arches now run as parallel matrix jobs, and the result is
    # cached by the build recipe's hash so an unchanged tmux version rebuilds instantly.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm   # GitHub-hosted native arm64 (no QEMU)
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Cache the built static tmux
        id: tmux-cache
        uses: actions/cache@v4
        with:
          path: dist/linux-${{ matrix.arch }}/tmux
          key: tmux-${{ matrix.arch }}-${{ hashFiles('deploy/tmux/Dockerfile', 'deploy/tmux/build-static-tmux.sh') }}
      - name: Set up Docker Buildx
        if: steps.tmux-cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build static tmux (native, no QEMU)
        if: steps.tmux-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          deploy/tmux/build-static-tmux.sh --arch "${{ matrix.arch }}" --out dist
          ls -la dist/*/
      - name: Upload tmux binary
        uses: actions/upload-artifact@v7
        with:
          name: tmux-linux-${{ matrix.arch }}
          path: dist/linux-${{ matrix.arch }}

  package-zip:
    needs: [build-jar, build-frontend, build-applet, build-cli, build-tmux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Assemble the deployment bundle
        run: |
          set -euo pipefail
          STAGE=microteams-deploy
          mkdir -p "$STAGE/backend" "$STAGE/frontend" "$STAGE/applets"
          cp deploy/docker-compose.yml deploy/nginx.conf deploy/gen-env.sh deploy/README.md "$STAGE/"
          cp -r deploy/init "$STAGE/"
          cp artifacts/jar/*.jar "$STAGE/backend/backend.jar"
          cp -r artifacts/frontend-dist/. "$STAGE/frontend/dist/"
          cp artifacts/applets/*.js "$STAGE/applets/"
          chmod +x "$STAGE/gen-env.sh"
          # The CLI distribution the backend serves: the cross-compiled `microteams` binaries and the
          # static tmux, laid out as connector/<target>/{microteams,tmux} (Go-style os-arch, matching
          # install.sh's `target` and update.go's platformDir). It's a shipped build artifact, so it
          # lives at the top level as connector/ — NOT under app_data/, which gen-env.sh creates fresh
          # at deploy time and holds only state you back up. compose bind-mounts connector/ to the
          # backend's default application.connector-binaries-dir (/app/connector).
          CONN="$STAGE/connector"
          for t in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            os="${t%-*}"; arch="${t#*-}"
            mkdir -p "$CONN/$t"
            cp "artifacts/cli-binaries/microteams-$os-$arch" "$CONN/$t/microteams"
            chmod +x "$CONN/$t/microteams"
          done
          # Static tmux is Linux-only; macOS uses its own via install.sh's system-tmux fallback.
          # Each arch is its own artifact (tmux-linux-<arch>/tmux) from the matrix build.
          for t in linux-amd64 linux-arm64; do
            arch="${t#linux-}"
            if [ -f "artifacts/tmux-linux-$arch/tmux" ]; then
              cp "artifacts/tmux-linux-$arch/tmux" "$CONN/$t/tmux"
              chmod +x "$CONN/$t/tmux"
            fi
          done
          # Pin every image to a digest in the SHIPPED compose so a deployed bundle is reproducible,
          # while the repo keeps only readable tags (a committed hash goes stale whenever a tag is
          # re-pushed). buildx imagetools reads public manifests with no auth; the resolved digest is
          # the multi-arch index digest, which is what compose should pull.
          COMPOSE="$STAGE/docker-compose.yml"
          for ref in $(grep -oE '^[[:space:]]*image:[[:space:]]*[^[:space:]]+' "$COMPOSE" | awk '{print $NF}'); do
            case "$ref" in *@sha256:*) continue ;; esac   # already pinned — leave it
            # Retry: registry manifest reads blip intermittently and shouldn't fail a release.
            digest=""
            for attempt in 1 2 3 4 5; do
              digest="$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
              case "$digest" in sha256:*) break ;; esac
              echo "  ($ref) digest not resolved yet (attempt $attempt), retrying…" >&2
              sleep 3
            done
            case "$digest" in sha256:*) : ;; *) echo "could not resolve digest for $ref after retries" >&2; exit 1 ;; esac
            esc="$(printf '%s' "$ref" | sed 's/[.[\*^$/]/\\&/g')"   # escape regex metachars in the tag
            sed -i "s#image: ${esc}\$#image: ${ref}@${digest}#" "$COMPOSE"
            echo "pinned $ref -> ${ref}@${digest}"
          done
          echo "== pinned images =="; grep -nE '^[[:space:]]*image:' "$COMPOSE"
          echo "== bundle contents =="; find "$STAGE" -maxdepth 3 -type f | sort
      # Upload the bundle DIRECTORY, not a pre-made zip: actions/upload-artifact already zips what it
      # receives, so uploading a .zip would nest it (download → microteams-deploy.zip → the real zip).
      # Uploading the dir means the downloaded artifact zip IS the bundle, one layer.
      - uses: actions/upload-artifact@v7
        with:
          name: microteams-deploy
          path: microteams-deploy

  test-compose:
    needs: [package-zip]
    runs-on: ubuntu-latest
    steps:
      # The artifact is the bundle directory (not a zip); download-artifact restores its files
      # directly into microteams-deploy/ — no unzip step, and no nested archive. Note: artifact
      # up/download does NOT preserve the executable bit, so gen-env.sh is invoked via `bash`.
      - uses: actions/download-artifact@v7
        with:
          name: microteams-deploy
          path: microteams-deploy
      - name: Bring the cluster up and wait for every service to be healthy
        working-directory: microteams-deploy
        run: |
          bash gen-env.sh
          docker compose up -d --wait --wait-timeout 360
      - name: Cluster status
        if: always()
        working-directory: microteams-deploy
        run: docker compose ps
      - name: Dump logs on failure
        if: failure()
        working-directory: microteams-deploy
        run: docker compose logs --no-color --tail 200
      - name: Tear down
        if: always()
        working-directory: microteams-deploy
        run: docker compose down
