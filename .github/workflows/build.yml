name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# One workflow builds all four parts in parallel, packages them into a deployment zip, then proves
# the zip actually boots by bringing the docker-compose cluster up and waiting for every service to
# report healthy.

jobs:
  build-jar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: backend/pom.xml
          # backend/.gitignore excludes settings.xml/toolchains.xml relative to backend/; point
          # setup-java there too, or the spotless "uncommitted changes" check sees them as untracked.
          settings-path: ${{ github.workspace }}/backend

      # Our tests are integration tests: they need a real Postgres (with the "microteams" schema) and
      # the real cheese-auth service. One script brings both up, mirroring the local setup.
      - name: Start dependencies (Postgres + cheese-auth)
        run: ./scripts/dependency-start.sh

      - name: Build with Maven (runs the integration tests)
        run: ./mvnw install
        env:
          SPRING_APPLICATION_JSON: '{"spring.jpa.hibernate.ddl-auto":"update","application.git-repo-base":"${{ runner.temp }}/microteams-git"}'

      - name: Check uncommitted changes to ensure format applied
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git status
            echo "There are uncommitted changes. Please run './mvnw spotless:apply' and commit the changes."
            exit 1
          else
            echo "No uncommitted changes."
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: jar
          path: backend/target/*.jar

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  build-applet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applets
    steps:
      - uses: actions/checkout@v7
      # openapi-generator (the codegen step) runs on the JVM.
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: applets/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload applets
        uses: actions/upload-artifact@v7
        with:
          name: applets
          path: applets/dist

  build-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build binaries (one per OS/arch)
        run: |
          set -euo pipefail
          mkdir -p dist
          # Product version from the repo-root VERSION file (single source of truth,
          # managed by scripts/version.sh), with the short commit as build metadata for
          # traceability — e.g. 0.1.0+1a2b3c4. cwd is cli/, so VERSION is one level up.
          VERSION="$(cat ../VERSION)+${GITHUB_SHA::7}"
          # Unix only: the host uses a pty, tmux, and SIGUSR2, so a machine that runs agents is
          # always Linux or macOS — Windows is not a target (it lacks syscall.SIGUSR2).
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${t%/*}"; arch="${t#*/}"
            echo "building microteams-$os-$arch"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=$VERSION" \
              -o "dist/microteams-$os-$arch" .
          done
          ls -la dist
      - name: Upload cli binaries
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: cli/dist

  build-tmux:
    # A fully static tmux per Linux target, so a fresh machine needs nothing pre-installed:
    # install.sh drops it at ~/.config/microteams/bin/tmux (macOS is not published — install.sh
    # falls back to copying the machine's own tmux there). Only the build recipe is in git.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up QEMU (for the linux/arm64 build)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build static tmux (one per Linux target)
        run: |
          set -euo pipefail
          for a in amd64 arm64; do
            deploy/tmux/build-static-tmux.sh --arch "$a" --out dist
          done
          ls -la dist/*/
      - name: Upload tmux binaries
        uses: actions/upload-artifact@v7
        with:
          name: tmux-binaries
          path: dist

  package-zip:
    needs: [build-jar, build-frontend, build-applet, build-cli, build-tmux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Assemble the deployment bundle
        run: |
          set -euo pipefail
          STAGE=microteams-deploy
          mkdir -p "$STAGE/backend" "$STAGE/frontend" "$STAGE/applets" "$STAGE/cli"
          cp deploy/docker-compose.yml deploy/nginx.conf deploy/gen-env.sh deploy/README.md "$STAGE/"
          cp -r deploy/init "$STAGE/"
          cp artifacts/jar/*.jar "$STAGE/backend/backend.jar"
          cp -r artifacts/frontend-dist/. "$STAGE/frontend/dist/"
          cp artifacts/applets/*.js "$STAGE/applets/"
          cp artifacts/cli-binaries/* "$STAGE/cli/"
          chmod +x "$STAGE/gen-env.sh"
          # CLI distribution: arrange the cross-compiled `microteams` binaries and the static tmux
          # into the connector/latest/<target>/ layout the backend serves, under app_data/connector
          # (compose bind-mounts it to application.connector-binaries-dir). Go-style os-arch dirs,
          # matching install.sh's `target` and update.go's platformDir.
          CONN="$STAGE/app_data/connector"
          for t in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            os="${t%-*}"; arch="${t#*-}"
            mkdir -p "$CONN/$t"
            cp "artifacts/cli-binaries/microteams-$os-$arch" "$CONN/$t/microteams"
            chmod +x "$CONN/$t/microteams"
          done
          # Static tmux is Linux-only; macOS uses its own via install.sh's system-tmux fallback.
          for t in linux-amd64 linux-arm64; do
            if [ -f "artifacts/tmux-binaries/$t/tmux" ]; then
              cp "artifacts/tmux-binaries/$t/tmux" "$CONN/$t/tmux"
              chmod +x "$CONN/$t/tmux"
            fi
          done
          zip -qr microteams-deploy.zip "$STAGE"
          echo "== bundle contents =="; find "$STAGE" -maxdepth 3 -type f | sort
      - uses: actions/upload-artifact@v7
        with:
          name: microteams-deploy
          path: microteams-deploy.zip

  test-compose:
    needs: [package-zip]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: microteams-deploy
      - name: Unzip
        run: unzip -q microteams-deploy.zip
      - name: Bring the cluster up and wait for every service to be healthy
        working-directory: microteams-deploy
        run: |
          ./gen-env.sh
          docker compose up -d --wait --wait-timeout 360
      - name: Cluster status
        if: always()
        working-directory: microteams-deploy
        run: docker compose ps
      - name: Dump logs on failure
        if: failure()
        working-directory: microteams-deploy
        run: docker compose logs --no-color --tail 200
      - name: Tear down
        if: always()
        working-directory: microteams-deploy
        run: docker compose down
