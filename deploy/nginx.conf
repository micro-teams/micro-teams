# The single, domain-independent gateway. Everything is same-origin so the browser's httpOnly
# refresh cookie sticks and no domain is ever baked in: the SPA, cheese-auth (/api), and this
# backend (/mt) are all served from whatever host an outer reverse-proxy maps in. That outer proxy
# terminates TLS and sets X-Forwarded-Proto/Host; this nginx forwards them so the backend can derive
# absolute URLs (install.sh connector base, etc.) without knowing its own domain.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Large uploads / long-lived sockets shouldn't be cut short.
    client_max_body_size 64m;

    # cheese-auth (identity) at /api — strip the prefix (it mounts routes at the root). The refresh
    # cookie is set with Path=/users/auth; rewrite it to / so it rides every /api request, matching
    # what the dev vite proxy does.
    location /api/ {
        proxy_pass http://cheese-auth:8091/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path /users/auth /;
    }

    # This backend (teams / chat / documents / machines / agents) at /mt — strip the prefix. One
    # block covers both HTTP and every WebSocket under it (/mt/ws STOMP chat, /mt/machine/link the
    # connector, /mt/machine/screen/:sid the live viewer).
    location /mt/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # CLI distribution, served at the ORIGIN ROOT (never under /mt): the one-line installer and the
    # prebuilt `microteams`/`tmux` binaries the CLI's self-updater downloads. Proxied to the backend
    # at the SAME path (no prefix strip) — the backend maps /install.sh and /connector/... directly.
    # X-Forwarded-* let it bake the right origin into install.sh; a machine runs
    # `curl -fsSL <origin>/install.sh | sh` and then `<origin>/connector/latest/<target>/microteams`.
    location = /install.sh {
        proxy_pass http://backend:8080/install.sh;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /connector/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # The SPA. Static, domain-independent (relative /api and /mt paths); any unknown route falls back
    # to index.html for client-side routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
