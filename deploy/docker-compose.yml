# MicroTeams deployment — stock images + bind-mounted build artifacts, no custom images.
#
#   nginx      the domain-independent gateway (SPA + /api -> cheese-auth + /mt -> backend)
#   backend    this app's jar, run on a stock JRE image
#   cheese-auth identity service (a prebuilt image)
#   postgres   shared DB: cheese-auth owns schema "public", backend owns "microteams"
#
# Secrets come from .env (generate it with `bash gen-env.sh`). All state lives in ./app_data/ as plain
# host directories (no docker volumes) so it's visible and easy to back up. Images are pinned by
# digest so a deployment is reproducible.

services:
  postgres:
    image: postgres:16.2@sha256:4aea012537edfad80f98d870a36e6b90b4c09b27be7f4b4759d72db863baeebb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./app_data/postgresql:/var/lib/postgresql/data
      # Runs once on first init: create the "microteams" schema the backend owns (Hibernate then
      # fills its tables + sequences). A fresh DB has no stray same-named sequences, so the
      # allocation-size trap that bites a reused local DB never applies here.
      - ./init/01-microteams-schema.sql:/docker-entrypoint-initdb.d/01-microteams-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  cheese-auth:
    image: ghcr.io/micro-teams/cheese-auth:dev@sha256:fe5a90a2680cac0bd634934b9a45c4cf48d171ee90e95f5f463de88932b31d22
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PRISMA_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=16
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8091"
      # prisma db push on first start is gated on a flag file under FILE_UPLOAD_PATH; the default
      # avatar (id 1) is seeded on start and every profile attaches to it.
      FILE_UPLOAD_PATH: /app/uploads
      DEFAULT_AVATAR_NAME: default.jpg
      COOKIE_BASE_URL: /
      # The public origin (https://your-domain) baked into verification-email links. MUST be your
      # real domain — the default localhost makes every registration link point at the user's own
      # machine. Set PUBLIC_URL in .env.
      FRONTEND_BASE_URL: ${PUBLIC_URL:-http://localhost}
      # SMTP — cheese-auth emails a code on registration, so registration is dead without it.
      # Fill these in .env. SSL_ENABLE=true is for implicit TLS (port 465); plain/STARTTLS use false.
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-25}
      EMAIL_SMTP_USERNAME: ${EMAIL_SMTP_USERNAME:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_SMTP_SSL_ENABLE: ${EMAIL_SMTP_SSL_ENABLE:-false}
      EMAIL_DEFAULT_FROM: ${EMAIL_DEFAULT_FROM:-MicroTeams <no-reply@localhost>}
    volumes:
      - ./app_data/cheese-auth-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8091/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  backend:
    image: eclipse-temurin:21-jre@sha256:273396ed5998598ed1091e8d72711c2d36980a0e65103859c55a4e977a41ffd3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      cheese-auth:
        condition: service_healthy
    working_dir: /app
    command: ["java", "-jar", "/app/backend.jar"]
    environment:
      # The backend derives absolute URLs from X-Forwarded-* (no domain baked in); ddl-auto=update
      # creates its tables in the "microteams" schema on first boot. Applets are mounted, not baked.
      SPRING_APPLICATION_JSON: >-
        {"spring.datasource.url":"jdbc:postgresql://postgres:5432/${POSTGRES_DB}",
        "spring.datasource.username":"${POSTGRES_USER}",
        "spring.datasource.password":"${POSTGRES_PASSWORD}",
        "spring.jpa.hibernate.ddl-auto":"update",
        "application.jwt-secret":"${JWT_SECRET}",
        "application.legacy-url":"http://cheese-auth:8091",
        "application.applets-dir":"/app/applets",
        "application.git-repo-base":"/app/app_data/git"}
    volumes:
      - ./backend/backend.jar:/app/backend.jar:ro
      - ./applets:/app/applets:ro
      - ./app_data/git:/app/app_data/git
      # The CLI distribution the backend serves at /connector/latest/<target>/<artifact>: the
      # cross-compiled `microteams` binaries + static tmux, laid out by CI under connector/.
      # Read-only — it's a shipped build artifact, not runtime state, so it lives OUTSIDE app_data/
      # (which holds only state you back up). Matches the backend's default
      # application.connector-binaries-dir (/app/connector), so nothing extra to configure.
      - ./connector:/app/connector:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # The host port your outer reverse-proxy points at (defaults to 80).
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      # 127.0.0.1, not localhost: inside alpine localhost may resolve to ::1 first, but nginx here
      # listens on IPv4 only, so an IPv6 probe would be refused.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
